<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 404</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1565c0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(33, 150, 243, 0.2);
            max-width: 520px;
            width: 90%;
            border: 2px solid rgba(33, 150, 243, 0.1);
        }
        .error-code {
            font-size: 96px;
            font-weight: bold;
            background: linear-gradient(135deg, #2196f3, #1976d2, #1565c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(33, 150, 243, 0.1);
        }
        .error-title {
            font-size: 28px;
            margin: 20px 0;
            color: #0d47a1;
            font-weight: 600;
        }
        .error-message {
            font-size: 16px;
            color: #424242;
            margin: 25px 0;
            line-height: 1.8;
        }
        .error-list {
            text-align: left;
            color: #546e7a;
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }
        .error-list li {
            margin: 12px 0;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(227, 242, 253, 0.6), rgba(187, 222, 251, 0.4));
            border-radius: 8px;
            border-left: 4px solid #2196f3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        .error-list li:before {
            content: "•";
            color: #2196f3;
            font-size: 24px;
            margin-right: 12px;
            line-height: 1;
        }
        .error-list li:hover {
            background: linear-gradient(135deg, rgba(227, 242, 253, 0.9), rgba(187, 222, 251, 0.7));
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.15);
        }
        .error-path {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            padding: 15px 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #1565c0;
            margin: 20px 0;
            word-break: break-all;
            border: 1px solid rgba(33, 150, 243, 0.2);
        }
        .btn-home {
            display: inline-block;
            background: linear-gradient(135deg, #2196f3, #1976d2);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 25px;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
            font-weight: 500;
        }
        .btn-home:hover {
            background: linear-gradient(135deg, #1976d2, #1565c0);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }
        .footer {
            margin-top: 35px;
            color: #78909c;
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid rgba(33, 150, 243, 0.1);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #2196f3;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="error-code">404</h1>
    <p class="error-message">
        抱歉，您访问的页面不存在或已被移除。
        这可能是由于以下原因：
    </p>
    <ul class="error-list">
        <li>页面链接已过期</li>
        <li>页面已被删除或移动</li>
        <li>URL 地址输入错误</li>
    </ul>
    <div class="error-path">
        请求路径: {{.path}}
    </div>
    <a href="/" class="btn-home">返回首页</a>
    <div class="footer">
        错误代码: 404 | 请求方法: {{.method}}
    </div>
</div>
</body>
</html>
