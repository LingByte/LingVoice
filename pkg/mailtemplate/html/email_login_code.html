<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录验证码</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 24px; background: #f5f6f8; }
        .container { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px 32px; border: 1px solid #e8eaed; }
        .code {
            text-align: center;
            font-size: 28px;
            letter-spacing: 8px;
            font-weight: 600;
            padding: 20px 16px;
            margin: 20px 0;
            background: #f3f0ff;
            border: 1px dashed #7c3aed;
            border-radius: 8px;
            color: #4c1d95;
        }
        .muted { color: #64748b; font-size: 14px; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <p>{{.Username}}，您好</p>
    <p>您正在登录 LingVoice，请使用以下验证码完成登录：</p>
    <div class="code">{{.Code}}</div>
    <p>验证码在 <strong>{{.ExpireHint}}</strong> 内有效，请勿告知他人。</p>
    <p class="muted">如非本人操作，请忽略此邮件。</p>
</div>
</body>
</html>
